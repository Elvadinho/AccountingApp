<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Rounded square base -->
  <rect width="48" height="48" rx="12" fill="url(#bg-gradient)"/>
  
  <!-- Wallet body -->
  <rect x="10" y="16" width="24" height="18" rx="3" fill="white" opacity="0.95"/>
  <rect x="10" y="16" width="24" height="6" rx="3" fill="white"/>
  
  <!-- Wallet clasp detail -->
  <rect x="27" y="23" width="8" height="6" rx="2" fill="#2563eb" opacity="0.15"/>
  <circle cx="32" cy="26" r="1.5" fill="#3b82f6"/>
  
  <!-- Upward trend arrow -->
  <path d="M24 14 L32 8 L38 8" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M35 11 L38 8 L35 5" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Small chart bars at bottom -->
  <rect x="14" y="38" width="3" height="4" rx="1" fill="#3b82f6" opacity="0.6"/>
  <rect x="19" y="36" width="3" height="6" rx="1" fill="#3b82f6" opacity="0.75"/>
  <rect x="24" y="34" width="3" height="8" rx="1" fill="#3b82f6" opacity="0.9"/>
  <rect x="29" y="32" width="3" height="10" rx="1" fill="#10b981"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
</svg>
